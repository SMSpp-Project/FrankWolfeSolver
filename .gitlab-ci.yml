default:
  image: registry.gitlab.com/smspp/smspp-project

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - smspp-project

stages:
  - build
  - test
  - deploy

build:
  stage: build
  script:
    - eval $(ssh-agent -s)
    - ssh-add <(echo "$SMSPP_DEPLOY_KEY")
    - mkdir -p ~/.ssh && ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts
    - if [ -d smspp-project ]; then (cd smspp-project && git pull); else git clone --branch develop git@gitlab.com:smspp/smspp-project.git; fi
    - cmake -S smspp-project -B smspp-project/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DBUILD_FrankWolfeSolver=ON -DBUILD_MCFBlock=ON -DBUILD_MCFClassSolver=ON -DBUILD_MILPSolver=ON -DBUILD_tests=ON
    - cmake --build smspp-project/build --target install
  artifacts:
    paths:
      - smspp-project/build
  only:
    refs:
      - develop
      - tags
    changes:
      - cmake/*
      - include/*
      - src/*
      - test/*
      - tools/*
      - CMakeLists.txt
      - .gitlab-ci.yml

test:
  stage: test
  before_script:
    # write the Gurobi WLS license from the masked CI/CD variables, if set
    - |
      if [ -n "$GRB_WLSSECRET" ]; then
        printf 'LICENSEID=%s\nWLSACCESSID=%s\nWLSSECRET=%s\n' \
          "$GRB_LICENSEID" "$GRB_WLSACCESSID" "$GRB_WLSSECRET" > /tmp/gurobi.lic
        export GRB_LICENSE_FILE=/tmp/gurobi.lic
      fi
  script:
    - ctest -V -C Release -L "$CI_PROJECT_TITLE" --test-dir smspp-project/build --no-tests=error
  only:
    refs:
      - develop
      - tags
    changes:
      - cmake/*
      - include/*
      - src/*
      - test/*
      - tools/*
      - CMakeLists.txt
      - .gitlab-ci.yml

deploy:
  stage: deploy
  script:
    - cd smspp-project/build && cpack -G "TGZ;ZIP;TBZ2"
  artifacts:
    paths:
      - smspp-project/build/*.tar.gz
      - smspp-project/build/*.tar.bz2
      - smspp-project/build/*.zip
  only:
    - tags
